name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/kimi-runner.js || (echo "dist/kimi-runner.js missing" && exit 1)
          test -f dist/session-reader.js || (echo "dist/session-reader.js missing" && exit 1)
          test -f dist/cache-manager.js || (echo "dist/cache-manager.js missing" && exit 1)
          # Verify test files are NOT in dist
          test ! -f dist/cache-manager.test.js || (echo "test file leaked to dist" && exit 1)
          echo "Build output verified"
